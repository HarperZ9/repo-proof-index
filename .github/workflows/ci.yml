name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest
      - run: python scripts/check_proof_surface_conformance.py
      - run: python scripts/export_proof_surface_contract.py --out /tmp/proof-surface-contract-v0.1
      - run: python scripts/score_proof_surface_research.py
